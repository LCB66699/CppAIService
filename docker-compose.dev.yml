version: "3.8"

# 本地开发环境
#
# 日常使用:
#   1. 启动依赖服务:        docker compose -f docker-compose.dev.yml up -d
#   2. 进入开发容器:        docker compose -f docker-compose.dev.yml run --rm app bash
#   3. 容器内编译+运行:      cmake -B build && cmake --build build -j$(nproc) && ./build/http_server -p 8117
#   4. 容器内运行单元测试:    cmake --build build && cd build && ctest --output-on-failure -R Unit
#   5. 容器内运行全量测试:    cmake --build build && cd build && ctest --output-on-failure
#   6. 一键启动全栈(含app):  docker compose -f docker-compose.dev.yml --profile full up -d
#
# 清理: docker compose -f docker-compose.dev.yml down -v

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    profiles:
      - full          # 仅在 --profile full 时启动 app 服务
    ports:
      - "${APP_PORT:-8117}:8117"
    volumes:
      - .:/workspace
      - build_cache:/workspace/build
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - Knowledge_Base_ID=${Knowledge_Base_ID:-}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug &&
        cmake --build build -j$$(nproc) &&
        echo "=== Starting http_server on port 8117 ===" &&
        ./build/http_server -p 8117

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: chat_service
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  build_cache:
